name: Step 4, Add Copilot suggestion from comment

# This step triggers after push to main#comments.js.
# This step updates from step 4 to step X.

# This will run every time we main#comments.js.
# Reference: https://docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "comments.js"

jobs:
  step_validate_and_update:
    uses: ./.github/workflows/reusable-step-validate-and-update.yml
    secrets: inherit
    with:
      expected_step: "4"
      from_step: "4"
      to_step: "X"
      check_file: "comments.js"
      check_search: "Create web server"
      fetch_depth: 0

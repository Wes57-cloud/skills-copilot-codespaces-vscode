name: Step 3, Copilot hub suggestion

# This step triggers after push to main#member.js.
# This workflow updates from step 3 to step 4.

# This will run every time we push to main#member.js.
# Reference: https://docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows
on:
  workflow_dispatch:
  push:
    paths:
      - "member.js"
    branches:
      - main

# Reference: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  # Need `contents: read` to checkout the repository.
  # Need `contents: write` to update the step metadata.
  contents: write

jobs:
  # The purpose of this job is to output the current step number
  # (retreived from the step file). This output variable can
  # then be referenced in other jobs and used in conditional
  # expressions.
  get_current_step:
    name: Check current step number
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: get_step
        run: |
          if [ ! -f ./.github/steps/-step.txt ]; then
            echo "::error::Step tracking file not found at .github/steps/-step.txt"
            exit 1
          fi
          current_step=$(cat ./.github/steps/-step.txt)
          if [ -z "$current_step" ]; then
            echo "::error::Step tracking file is empty — expected a step number"
            exit 1
          fi
          echo "current_step=$current_step" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  on_Copilothubsuggestions:
    name: On Copilot hub suggestion
    needs: get_current_step

    # We will only run this action when:
    # 1. This repository isn't the template repository.
    # Reference: https://docs.github.com/en/actions/learn-github-actions/contexts
    # Reference: https://docs.github.com/en/actions/learn-github-actions/expressions
    if: ${{ !github.event.repository.is_template && needs.get_current_step.outputs.current_step == 3 }}

    # We'll run Ubuntu for performance instead of Mac or Windows.
    runs-on: ubuntu-latest

    steps:
      # We'll need to check out the repository so that we can edit the README.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Let's get all the branches.

      # Verify the skills member function is present.
      - name: Check member.js for skillsMember function
        id: check_member_js
        uses: skills/action-check-file@v1
        with:
          file: "member.js"
          search: "skillsMember"

      - name: Report check failure
        if: failure() && steps.check_member_js.outcome == 'failure'
        run: |
          echo "::error::member.js is missing or does not contain the 'skillsMember' function."
          echo "::error::Please create member.js with a function named 'skillsMember' using Copilot hub suggestions."
          exit 1

      # In README.md, switch step 3 for step 4.
      - name: Update to step 4
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 3
          to_step: 4
